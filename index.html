<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quà 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* menu */

.container{
text-align:center;
z-index:10;
}

.menu{
display:grid;
grid-template-columns:repeat(2,200px);
gap:25px;
}

.menu-item{
background:white;
border:none;
border-radius:15px;
padding:30px;
font-size:18px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.menu-item:hover{
transform:scale(1.1);
}

.icon{
font-size:40px;
display:block;
margin-bottom:10px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

.popup-content{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
max-width:400px;
animation:zoom 0.6s;
position:relative;
z-index:200;
}

/* hiệu ứng ảnh */

img{
width:260px;
border-radius:15px;
display:block;
margin:auto;
animation:fade 1s;
}

@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fade{
0%{opacity:0}
100%{opacity:1}
}

.close{
cursor:pointer;
color:red;
font-size:20px;
}

/* tim bay */

.heart{
position:fixed;
color:#ff4f8b;
font-size:20px;
pointer-events:none;
animation:fly 6s linear infinite;
z-index:1;
}

@keyframes fly{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-900px) scale(1.5);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="menu">

<button class="menu-item" onclick="openPopup('music')">
<span class="icon">🎵</span>
Music
</button>

<button class="menu-item" onclick="openPopup('letter')">
<span class="icon">💌</span>
Letter
</button>

<button class="menu-item" onclick="openPopup('image')">
<span class="icon">🖼️</span>
Image
</button>

<button class="menu-item" onclick="openPopup('gift')">
<span class="icon">🎁</span>
Gift
</button>

</div>

</div>

<div class="popup" id="popup">
<div class="popup-content" id="content">
<span class="close" onclick="closePopup()">✖</span>
</div>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function openPopup(type){

let content=document.getElementById("content")
let music=document.getElementById("music")

if(type=="music"){
content.innerHTML=`
<span class="close" onclick="closePopup()">✖</span>
<h2>🎵 Bài hát tặng bạn</h2>
<p>Nghe nhạc nhé 💗</p>
`
music.play()
}

if(type=="letter"){
content.innerHTML=`
<span class="close" onclick="closePopup()">✖</span>
<h2>💌 Lời chúc</h2>
<p>Chúc bạn 8/3 thật vui vẻ 🌸<br>
Luôn xinh đẹp và hạnh phúc nhé 💖</p>
`
}

if(type=="image"){
content.innerHTML=`
<span class="close" onclick="closePopup()">✖</span>
<h2>🖼️ Ảnh</h2>
<img src="83.jpg">
`
}

if(type=="gift"){
content.innerHTML=`
<span class="close" onclick="closePopup()">✖</span>
<h2>🎁 Quà</h2>
<p>Món quà to lớn nhất là nụ cười của em💕</p>
`
}

document.getElementById("popup").style.display="flex"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

/* tim bay */

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"%"
heart.style.bottom="-20px"
heart.style.fontSize=(20+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
